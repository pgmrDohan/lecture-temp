<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>권도한</title>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet" type="text/css" />
    <style>
        html {
            font-size: 10px;
            font-family: "Open Sans", sans-serif;
            background-color: #e8ecf1;
        }

        body {
            width: 800px;
            margin: 0 auto 0 0;
            background-color: #e8ecf1;
            padding: 20px;
        }

        /* 상단 프로필 카드 */
        .profile-card {
            background-color: #ffffff;
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 10px;
            width: 350px;
            margin: 0 auto 30px 0;
        }

        .profile-card img {
            display: block;
            width: 250px;
            border-radius: 5px;
        }

        .profile-card h1 {
            font-size: 25px;
            text-align: left;
            margin: 15px 0 5px 0;
            padding: 0;
            color: #000;
        }

        .profile-card .role {
            font-size: 14px;
            color: #4a6ee0;
            font-weight: bold;
            margin: 0 0 5px 0;
        }

        .profile-card .intro {
            font-size: 14px;
            color: #555;
            margin: 0;
            line-height: 1.6;
        }

        /* 하단 상세 카드 */
        .detail-card {
            background-color: #ffffff;
            padding: 30px 40px 40px 40px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin: 0 auto;
        }

        .detail-card h1 {
            font-size: 35px;
            text-align: left;
            margin: 0 0 5px 0;
            padding: 0;
            color: #000;
        }

        .detail-card .role {
            font-size: 16px;
            color: #4a6ee0;
            font-weight: bold;
            margin: 0;
        }

        .detail-card .track {
            font-size: 14px;
            color: #555;
            margin: 5px 0 0 0;
        }

        h2 {
            font-size: 22px;
            color: #333;
            margin-top: 30px;
            margin-bottom: 10px;
        }

        p,
        li {
            font-size: 16px;
            line-height: 2;
            letter-spacing: 1px;
        }

        .detail-card p {
            color: #333;
        }

        .detail-card ul {
            padding-left: 20px;
        }

        .detail-card ul li {
            font-size: 16px;
            color: #333;
        }

        .detail-card a {
            color: #4a6ee0;
            text-decoration: none;
        }

        .detail-card a:hover {
            text-decoration: underline;
        }

        address {
            font-style: normal;
        }
    </style>
</head>

<body>

    <!-- 상단 프로필 카드 -->
    <div class="profile-card">
        <img src="me.jpeg" alt="프로필 사진">
        <h1>권도한</h1>
        <p class="role">Backend</p>
        <p class="intro">운영진</p>
    </div>

    <!-- 하단 상세 카드 -->
    <div class="detail-card">
        <h1>권도한</h1>
        <p class="role">Backend</p>
        <p class="track">운영진</p>

        <h2>자기소개</h2>
        <p>5년 째 웹 개발을 배워오고 있으며, 현재 스타트업에서 풀스택 개발자로 일하고 있습니다. 보유한 지식을 타인과 공유할 수 있는 커뮤니티 활동에 관심이 많습니다.</p>

        <h2>연락처</h2>
        <ul>
            <li>Email: <a href="mailto:me@dohan.in">me@dohan.in</a></li>
            <li>Phone: <a href="tel:+82(0)1047988844">010-4798-8844</a></li>
            <li>Website: <a href="https://dohan.in">https://dohan.in</a></li>
        </ul>

        <h2>관심 기술</h2>
        <ul>
            <li>React</li>
            <li>Typescript</li>
            <li>Django</li>
            <li>SQL</li>
        </ul>

        <h2>한 마디</h2>
        <p>첫 수업 너무 떨려요오옹..!</p>
    </div>

</body>

</html>
